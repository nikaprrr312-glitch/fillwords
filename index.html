<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Филворды — Найди все слова</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="game-wrapper">
            <header>
                <h1>📖 Филворды</h1>
                <div class="game-info">
                    <div class="topic-selector">
                        <label>📚 Тема:</label>
                        <select id="topic-select">
                            <option value="🐕 Животные">🐕 Животные</option>
                            <option value="🍎 Фрукты">🍎 Фрукты</option>
                            <option value="💼 Профессии">💼 Профессии</option>
                            <option value="⚽ Спорт">⚽ Спорт</option>
                            <option value="🎨 Цвета">🎨 Цвета</option>
                            <option value="🌊 Реки">🌊 Реки</option>
                        </select>
                        <button id="apply-topic" class="small-btn">Применить</button>
                    </div>
                    <div class="score">
                        Найдено: <span id="found-count">0</span> / <span id="total-count">0</span>
                    </div>
                </div>
            </header>

            <div class="game-area">
                <div class="grid-container">
                    <div class="grid" id="grid">
                        {% for row in grid %}
                            <div class="grid-row">
                                {% for letter in row %}
                                    <div class="grid-cell" data-row="{{ loop.index0 }}" data-col="{{ loop.index0 }}" data-letter="{{ letter }}">{{ letter }}</div>
                                {% endfor %}
                            </div>
                        {% endfor %}
                    </div>
                </div>

                <div class="words-panel">
                    <h2>📝 Найди слова:</h2>
                    <div class="words-list" id="word-list">
                        {% for word in words %}
                            <div class="word-item" data-word="{{ word }}">
                                <span class="word-text">{{ word }}</span>
                                <span class="word-check">✓</span>
                            </div>
                        {% endfor %}
                    </div>
                    <div class="controls">
                        <button id="new-game-btn">🎲 Новая игра</button>
                        <button id="restart-btn">🔄 Перемешать</button>
                    </div>
                </div>
            </div>

            <div class="message" id="message"></div>
        </div>
    </div>

    <script>
        let isSelecting = false;
        let startCell = null;
        let selectedCells = [];

        const grid = document.getElementById('grid');
        const messageDiv = document.getElementById('message');
        const foundCountSpan = document.getElementById('found-count');
        const totalCountSpan = document.getElementById('total-count');
        
        let totalWords = document.querySelectorAll('.word-item').length;
        totalCountSpan.textContent = totalWords;

        // Функция для получения списка найденных слов
        function getFoundWords() {
            const found = [];
            document.querySelectorAll('.word-item.found').forEach(item => {
                found.push(item.dataset.word);
            });
            return found;
        }

        function init() {
            attachGridEvents();
            updateFoundCount();
            
            document.getElementById('new-game-btn').addEventListener('click', newGame);
            document.getElementById('restart-btn').addEventListener('click', smartRestart);
            document.getElementById('apply-topic').addEventListener('click', changeTopic);
        }

        async function smartRestart() {
            const topic = document.getElementById('topic-select').value;
            const foundWords = getFoundWords();
            
            showMessage('🔄 Перемешиваю не найденные буквы...', 'success');
            
            const response = await fetch('/smart_restart', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    topic: topic, 
                    found_words: foundWords 
                })
            });
            
            const data = await response.json();
            
            if (data.grid) {
                await updateGridOnly(data.grid, foundWords);
                showMessage('✨ Не найденные буквы перемешаны! Продолжайте поиск ✨', 'success');
            }
        }

        // Обновляет только сетку, не трогая список слов
        async function updateGridOnly(newGrid, foundWords) {
            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';
            
            newGrid.forEach((row, rowIdx) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'grid-row';
                row.forEach((letter, colIdx) => {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.row = rowIdx;
                    cell.dataset.col = colIdx;
                    cell.dataset.letter = letter;
                    cell.textContent = letter;
                    rowDiv.appendChild(cell);
                });
                gridContainer.appendChild(rowDiv);
            });
            
            attachGridEvents();
            
            // Восстанавливаем подсветку найденных слов
            for (const word of foundWords) {
                const response = await fetch('/restore_word_highlight', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ word: word })
                });
                const data = await response.json();
                if (data.position) {
                    highlightFoundWord(data.position);
                }
            }
        }

        function attachGridEvents() {
            const cells = document.querySelectorAll('.grid-cell');
            
            cells.forEach(cell => {
                cell.removeEventListener('mousedown', onMouseDown);
                cell.removeEventListener('mouseenter', onMouseEnter);
                cell.removeEventListener('mouseup', onMouseUp);
                cell.removeEventListener('dragstart', preventDrag);
                
                cell.addEventListener('mousedown', onMouseDown);
                cell.addEventListener('mouseenter', onMouseEnter);
                cell.addEventListener('mouseup', onMouseUp);
                cell.addEventListener('dragstart', preventDrag);
            });
            
            document.removeEventListener('mouseup', onDocumentMouseUp);
            document.addEventListener('mouseup', onDocumentMouseUp);
        }

        function preventDrag(e) {
            e.preventDefault();
            return false;
        }

        function onMouseDown(e) {
            e.preventDefault();
            const cell = e.target.closest('.grid-cell');
            if (!cell) return;
            
            // Не даём выделять уже найденные слова
            if (cell.classList.contains('found-word')) return;
            
            isSelecting = true;
            startCell = cell;
            selectedCells = [cell];
            clearHighlight();
            highlightCells(selectedCells);
        }

        function onMouseEnter(e) {
            if (!isSelecting || !startCell) return;
            
            const currentCell = e.target.closest('.grid-cell');
            if (!currentCell) return;
            
            // Не даём выделять уже найденные слова
            if (currentCell.classList.contains('found-word')) return;
            
            const startRow = parseInt(startCell.dataset.row);
            const startCol = parseInt(startCell.dataset.col);
            const currentRow = parseInt(currentCell.dataset.row);
            const currentCol = parseInt(currentCell.dataset.col);
            
            const deltaRow = currentRow - startRow;
            const deltaCol = currentCol - startCol;
            
            if (deltaRow === 0 || deltaCol === 0 || Math.abs(deltaRow) === Math.abs(deltaCol)) {
                const stepRow = deltaRow === 0 ? 0 : (deltaRow > 0 ? 1 : -1);
                const stepCol = deltaCol === 0 ? 0 : (deltaCol > 0 ? 1 : -1);
                
                const steps = Math.max(Math.abs(deltaRow), Math.abs(deltaCol));
                
                const newSelected = [];
                let valid = true;
                
                for (let i = 0; i <= steps; i++) {
                    const row = startRow + i * stepRow;
                    const col = startCol + i * stepCol;
                    const cell = document.querySelector(`.grid-cell[data-row='${row}'][data-col='${col}']`);
                    if (cell) {
                        // Проверяем, что все ячейки не из найденных слов
                        if (cell.classList.contains('found-word')) {
                            valid = false;
                            break;
                        }
                        newSelected.push(cell);
                    }
                }
                
                if (valid && newSelected.length > 0) {
                    clearHighlight();
                    selectedCells = newSelected;
                    highlightCells(selectedCells);
                }
            }
        }

        function onMouseUp(e) {
            if (isSelecting) {
                finishSelection();
            }
            isSelecting = false;
        }

        function onDocumentMouseUp(e) {
            if (isSelecting) {
                finishSelection();
                isSelecting = false;
            }
        }

        function finishSelection() {
            if (selectedCells.length > 0) {
                const word = selectedCells.map(cell => cell.dataset.letter).join('');
                const positions = selectedCells.map(cell => ({
                    row: parseInt(cell.dataset.row),
                    col: parseInt(cell.dataset.col)
                }));
                
                checkWord(word, positions);
            }
            
            clearHighlight();
            selectedCells = [];
            startCell = null;
        }

        function highlightCells(cells) {
            cells.forEach(cell => cell.classList.add('selected'));
        }

        function clearHighlight() {
            document.querySelectorAll('.grid-cell.selected').forEach(cell => {
                cell.classList.remove('selected');
            });
        }

        async function checkWord(word, positions) {
            const response = await fetch('/check_word', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ word: word, positions: positions })
            });
            
            const result = await response.json();
            
            if (result.correct) {
                const wordItem = document.querySelector(`.word-item[data-word="${result.word}"]`);
                if (wordItem && !wordItem.classList.contains('found')) {
                    wordItem.classList.add('found');
                    
                    if (result.positions && result.positions[0]) {
                        highlightFoundWord(result.positions[0]);
                    }
                    
                    showMessage(`✅ Найдено слово: ${result.word}!`, 'success');
                    updateFoundCount();
                    
                    if (result.all_found) {
                        showMessage('🎉 Поздравляем! Вы нашли все слова! 🎉', 'success');
                        createConfetti();
                    }
                }
            } else {
                if (result.already_found) {
                    showMessage(`ℹ️ Слово "${result.word}" уже найдено ранее`, 'info');
                } else {
                    showMessage(`❌ Слова "${result.word}" нет в списке`, 'error');
                }
                selectedCells.forEach(cell => {
                    cell.style.backgroundColor = '#ffe3e3';
                    setTimeout(() => {
                        cell.style.backgroundColor = '';
                    }, 300);
                });
            }
        }

        function highlightFoundWord(position) {
            const { start, end } = position;
            const deltaRow = end[0] - start[0];
            const deltaCol = end[1] - start[1];
            const stepRow = deltaRow === 0 ? 0 : (deltaRow > 0 ? 1 : -1);
            const stepCol = deltaCol === 0 ? 0 : (deltaCol > 0 ? 1 : -1);
            const steps = Math.max(Math.abs(deltaRow), Math.abs(deltaCol));
            
            for (let i = 0; i <= steps; i++) {
                const row = start[0] + i * stepRow;
                const col = start[1] + i * stepCol;
                const cell = document.querySelector(`.grid-cell[data-row='${row}'][data-col='${col}']`);
                if (cell) {
                    cell.classList.add('found-word');
                }
            }
        }

        function updateFoundCount() {
            const foundWords = document.querySelectorAll('.word-item.found').length;
            foundCountSpan.textContent = foundWords;
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 2500);
        }

        async function newGame() {
            const topic = document.getElementById('topic-select').value;
            const response = await fetch(`/new_game?topic=${encodeURIComponent(topic)}`);
            const data = await response.json();
            
            updateGrid(data.grid);
            updateWordList(data.words);
            
            document.querySelector('.topic-selector select').value = data.topic;
            showMessage('Новая игра начата!', 'success');
            updateFoundCount();
        }

        async function changeTopic() {
            const topic = document.getElementById('topic-select').value;
            const response = await fetch(`/new_game?topic=${encodeURIComponent(topic)}`);
            const data = await response.json();
            
            updateGrid(data.grid);
            updateWordList(data.words);
            showMessage(`Тема изменена на "${data.topic}"`, 'success');
            updateFoundCount();
        }

        function updateGrid(newGrid) {
            const gridContainer = document.getElementById('grid');
            gridContainer.innerHTML = '';
            
            newGrid.forEach((row, rowIdx) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'grid-row';
                row.forEach((letter, colIdx) => {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.row = rowIdx;
                    cell.dataset.col = colIdx;
                    cell.dataset.letter = letter;
                    cell.textContent = letter;
                    rowDiv.appendChild(cell);
                });
                gridContainer.appendChild(rowDiv);
            });
            
            attachGridEvents();
        }

        function updateWordList(words) {
            const wordListContainer = document.getElementById('word-list');
            wordListContainer.innerHTML = '';
            
            words.forEach(word => {
                const wordDiv = document.createElement('div');
                wordDiv.className = 'word-item';
                wordDiv.dataset.word = word;
                wordDiv.innerHTML = `
                    <span class="word-text">${word}</span>
                    <span class="word-check">✓</span>
                `;
                wordListContainer.appendChild(wordDiv);
            });
            
            totalWords = words.length;
            totalCountSpan.textContent = totalWords;
        }

        function createConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff6600', '#ff0066'];
            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.width = Math.random() * 12 + 4 + 'px';
                confetti.style.height = Math.random() * 12 + 4 + 'px';
                confetti.style.animationDuration = Math.random() * 3 + 1 + 's';
                confetti.style.animationDelay = Math.random() * 0.5 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        // Отладочная функция (можно вызвать в консоли)
        async function debugGrid() {
            const response = await fetch('/debug_grid');
            const data = await response.json();
            console.log('=== ОТЛАДКА СЕТКИ ===');
            console.log('Слова:', data.words);
            console.log('Найденные слова:', data.found_words);
            console.log('Сетка:');
            if (data.grid) {
                data.grid.forEach(row => console.log(row.join(' ')));
            }
            return data;
        }

        init();
    </script>
</body>
</html>
